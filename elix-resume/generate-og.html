<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .og {
    width: 1200px; height: 630px;
    background: #0c0a1a;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .orb1 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    top: -80px; right: -40px; filter: blur(80px); opacity: 0.5;
    background: radial-gradient(circle, rgba(167,139,250,0.4), transparent 70%);
  }
  .orb2 {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    bottom: -60px; left: -40px; filter: blur(80px); opacity: 0.4;
    background: radial-gradient(circle, rgba(245,158,11,0.3), transparent 70%);
  }
  .content { text-align: center; position: relative; z-index: 1; }
  .logo {
    font-size: 64px; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .logo .elix { color: #a78bfa; }
  .logo .dash { color: #f59e0b; }
  .logo .rest { color: #ede9fe; }
  .tagline {
    font-size: 22px; color: #a89ec4; font-weight: 400;
    letter-spacing: 0.02em;
  }
  .bar {
    width: 120px; height: 4px; border-radius: 2px; margin: 24px auto 0;
    background: linear-gradient(90deg, #a78bfa, #f59e0b);
  }
  .footer-text {
    margin-top: 24px; font-size: 14px; color: #7c6f9b;
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600;
  }
</style>
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
<div class="og">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <div class="logo"><span class="elix">ELIX</span><span class="dash">-</span><span class="rest">Resume</span></div>
    <div class="tagline">Craft Your Professional Story</div>
    <div class="bar"></div>
    <div class="footer-text">Free &middot; Private &middot; No Sign-Up</div>
  </div>
</div>
</body>
</html>
