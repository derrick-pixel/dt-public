<body>
<main class="container" style="max-width: 480px; margin: 4rem auto;">
  <h1>Reset your password</h1>
  <p>Choose a new password (minimum 12 characters).</p>
  <form id="reset-form" class="login-form" autocomplete="off">
    <div class="field">
      <label for="pw">New password</label>
      <input id="pw" name="pw" type="password" required minlength="12" autocomplete="new-password" />
    </div>
    <div class="field">
      <label for="pw2">Confirm password</label>
      <input id="pw2" name="pw2" type="password" required minlength="12" autocomplete="new-password" />
    </div>
    <button class="btn btn--brass" type="submit">Update password</button>
    <div id="err" class="alert alert--bad" style="margin-top:1rem; display:none;"></div>
  </form>
</main>
<script>
(function () {
  const form = document.getElementById("reset-form");
  const err = document.getElementById("err");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.style.display = "none";
    const pw = form.pw.value;
    const pw2 = form.pw2.value;
    if (pw !== pw2) {
      err.textContent = "Passwords don't match."; err.style.display = "block"; return;
    }
    if (pw.length < 12) {
      err.textContent = "Password must be at least 12 characters."; err.style.display = "block"; return;
    }
    const supa = window.ESOPSupa && window.ESOPSupa.client;
    if (!supa) {
      err.textContent = "Auth client not initialised. Refresh the page."; err.style.display = "block"; return;
    }
    const { error } = await supa.auth.updateUser({ password: pw });
    if (error) { err.textContent = error.message; err.style.display = "block"; return; }
    await window.ESOPAuth.ready();
    const s = window.ESOPAuth.readSession();
    location.href = !s ? "index.html"
      : s.kind === "holder" ? "portal.html"
      : s.kind === "admin" ? "admin.html"
      : "committee.html";
  });
})();
</script>
</body>
