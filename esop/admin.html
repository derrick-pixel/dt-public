  <h1 class="visually-hidden">Administrator console</h1>
  <noscript>
    <p>This page is the authenticated administrator console of the Elitez ESOP platform. JavaScript is required to render the cap-table overview, the holders and grants tables, the valuation history, the exercise queue with document generation, and the full audit log of every event the store has emitted. The administrator role is the only role that can ingest external valuations or correct historical events.</p>
    <p>If you reached this page without being signed in, the platform's overview pages are public:</p>

      <li><a href="index.html">Home</a> — what the Elitez ESOP platform is and who it is for</li>
