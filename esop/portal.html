  <h1 class="visually-hidden">Your ESOP portfolio</h1>
  <noscript>
    <p>This page is the authenticated employee portfolio view of the Elitez ESOP platform. JavaScript is required to render the personalised vesting schedule, exercise ledger, document vault, and trading-window state. The portal renders client-side from an event-sourced localStorage store; no employee data is sent off-device.</p>
    <p>If you reached this page without being signed in, the platform's overview pages do not require authentication:</p>
    <ul>
      <li><a href="index.html">Home</a> — what the Elitez ESOP platform is and who it is for</li>
      <li><a href="scheme.html">Scheme</a> — the rules of the share option plan in plain English</li>
      <li><a href="committee.html">Committee</a> — the body that approves grants, exercises, and trading windows</li>
      <li><a href="trading.html">Trading</a> — how the quarterly trading-window clearing engine matches buy and sell intents</li>
      <li><a href="intel/index.html">Intel</a> — competitive analysis behind the platform's design</li>
    </ul>
    <p>Once your account is provisioned by the committee, sign in and your portfolio (vested vs unvested options, exercise history, share-class breakdown, downloadable PDF documents) will render here.</p>
  </noscript>
