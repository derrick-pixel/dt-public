<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Ink background -->
  <rect width="1200" height="630" fill="#0E2640"/>

  <!-- Top hairline accent band -->
  <rect x="0" y="0" width="1200" height="6" fill="#EE6A1F"/>

  <!-- Subtle paper-toned panel area on right edge for editorial feel -->
  <rect x="1100" y="0" width="100" height="630" fill="#1F3A56"/>

  <!-- Eyebrow micro label -->
  <text x="80" y="120" font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="20" font-weight="500" letter-spacing="4" fill="#EE6A1F">PRIVATE PLATFORM · COMMITTEE + OPTION HOLDERS</text>

  <!-- Wordmark: ELITEZ in serif, ESOP in italic accent -->
  <text x="80" y="280" font-family="Georgia, 'Fraunces', serif" font-size="140" font-weight="500" fill="#F5EFDC">ELITEZ</text>
  <text x="80" y="420" font-family="Georgia, 'Fraunces', serif" font-size="140" font-weight="500" font-style="italic" fill="#EE6A1F">ESOP</text>

  <!-- Tagline -->
  <text x="80" y="510" font-family="'Inter', -apple-system, sans-serif" font-size="30" font-weight="400" fill="#F5EFDC" opacity="0.85">The Elitez Group Employee Share Option Plan —</text>
  <text x="80" y="550" font-family="'Inter', -apple-system, sans-serif" font-size="30" font-weight="400" fill="#F5EFDC" opacity="0.85">vesting, value, windows, and the rules in plain English.</text>

  <!-- Bottom band -->
  <rect x="0" y="610" width="1200" height="20" fill="#8A1F1F"/>
  <text x="80" y="595" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="500" letter-spacing="2" fill="#F5EFDC" opacity="0.6">DERRICKTEO.COM/ESOP</text>
