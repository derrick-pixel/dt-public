name: Purge Cloudflare cache for derrickteo.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Wait for GitHub Pages to rebuild
        run: sleep 60

      - name: Purge Cloudflare cache (purge_everything)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE:  ${{ secrets.CLOUDFLARE_DERRICKTEO_ZONE_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}')
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "import sys, json; d=json.loads(sys.stdin.read()); sys.exit(0 if d.get('success') else 1)"

      - name: Verify derrickteo.com responds 200
        run: |
          set -euo pipefail
          for ATTEMPT in 1 2 3 4 5; do
            CB="${RANDOM}${RANDOM}"
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://derrickteo.com/?cb=${CB}")
            echo "Attempt ${ATTEMPT}: HTTP ${CODE}"
            if [ "${CODE}" = "200" ]; then exit 0; fi
            sleep 8
          done
          echo "derrickteo.com did not return 200 after 5 attempts — investigate"
          exit 1
