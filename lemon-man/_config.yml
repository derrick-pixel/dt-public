# Jekyll config — GitHub Pages excludes these paths from the published site.
# Reason: admin/ holds competitive intel JSON + market data not meant to be
# public. Until admin moves to a server-auth host (CF Access), this is the
# enforcement that keeps it off the live URL.
#
# Local dev: open admin/*.html directly via file:// — they still work.
#
# Threat matrix vector #2 (2026-05-27).

exclude:
  - admin/
  - docs/
  - scripts/
  - "*.pdf"
  - "*.md"
  - .gitleaksignore
  - .gstack
  - README.md
