<!--
  Canvas Hero mechanic — full-bleed animated starfield background.
  Pauses RAF when document is hidden (battery-friendly).
  Drop the <canvas> + <style> + <script> into your hero section.
-->
<style>
  .mechanic-canvashero__wrap {
    position: relative;
    width: 100%;
    min-height: 60vh;
    overflow: hidden;
    background: radial-gradient(ellipse at top, #1a1f3a 0%, #0d1117 70%);
  }
  .mechanic-canvashero__canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .mechanic-canvashero__content {
    position: relative; z-index: 2;
    padding: 80px 24px;
    text-align: center;
    color: #f0f6fc;
  }
</style>

<div class="mechanic-canvashero__wrap" id="canvas-hero-wrap">
  <canvas class="mechanic-canvashero__canvas" id="canvas-hero"></canvas>
  <div class="mechanic-canvashero__content">
    <h1>Your hero headline</h1>
    <p>Replace this with your actual hero content.</p>
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas-hero');
  const wrap = document.getElementById('canvas-hero-wrap');
  if (!canvas || !wrap) return;
  const ctx = canvas.getContext('2d');

  let stars = [];
  let animationId = null;
  let isRunning = false;

  function sizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function seedStars() {
    const rect = wrap.getBoundingClientRect();
    const count = Math.min(200, Math.round(rect.width * rect.height / 5000));
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * rect.width,
        y: Math.random() * rect.height,
        r: Math.random() * 1.2 + 0.3,
        vx: (Math.random() - 0.5) * 0.2,
        vy: Math.random() * 0.3 + 0.05,
        alpha: Math.random() * 0.6 + 0.4
      });
    }
  }

  function draw() {
    const rect = wrap.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    for (const s of stars) {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#79c0ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      s.x += s.vx;
      s.y += s.vy;
      if (s.y > rect.height) { s.y = 0; s.x = Math.random() * rect.width; }
      if (s.x < 0) s.x = rect.width;
      if (s.x > rect.width) s.x = 0;
    }
    ctx.globalAlpha = 1;
  }

  function loop() {
    if (!isRunning) return;
    draw();
    animationId = requestAnimationFrame(loop);
  }

  function start() {
    if (isRunning) return;
    isRunning = true;
    loop();
  }

  function stop() {
    isRunning = false;
    if (animationId) cancelAnimationFrame(animationId);
    animationId = null;
  }

  function init() {
    sizeCanvas();
    seedStars();
    start();
  }

  // Pause when tab is hidden — respects user's battery
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stop();
    else start();
  });

  window.addEventListener('resize', () => {
    sizeCanvas();
    seedStars();
  });

  init();
})();
</script>
