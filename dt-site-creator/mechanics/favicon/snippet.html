<!--
  Favicon mechanic — complete set for every surface.
  Drop this block into your page's <head>. Generate the referenced image
  files once (tools: realfavicongenerator.net / favicon.io) and save them
  to your project root. See README.md for mix-and-match guidance.
-->

<!-- ── Required on every site ────────────────────────────────── -->
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

<!-- ── iOS home screen icon (180×180 PNG, transparent bg OK) ─── -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

<!-- ── Android / PWA (manifest references 192 + 512 PNGs) ─────── -->
<link rel="manifest" href="/site.webmanifest" />

<!-- ── Safari pinned-tab icon (monochrome SVG) ────────────────── -->
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#ffa657" />

<!-- ── Theme colors (address-bar tint on mobile) ──────────────── -->
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
