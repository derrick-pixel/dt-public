<!--
  Open Graph + Twitter Card meta tags.
  Drop this ENTIRE block into your page's <head>.
  Replace every {{placeholder}} with actual values per page.

  og:image must be 1200x630 JPEG/PNG and reachable at the absolute URL.
  Verify previews before announcing:
    - https://cards-dev.twitter.com/validator
    - https://developers.facebook.com/tools/debug/
    - Paste URL into WhatsApp (cache can be sticky — if stale, use FB Debugger's "Scrape Again")
-->

<!-- Standard SEO -->
<title>{{title}}</title>
<meta name="description" content="{{description}}" />

<!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
<meta property="og:type" content="website" />
<meta property="og:url" content="{{canonical_url}}" />
<meta property="og:title" content="{{title}}" />
<meta property="og:description" content="{{description}}" />
<meta property="og:image" content="{{canonical_url}}/og-image.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:site_name" content="{{site_name}}" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:url" content="{{canonical_url}}" />
<meta name="twitter:title" content="{{title}}" />
<meta name="twitter:description" content="{{description}}" />
<meta name="twitter:image" content="{{canonical_url}}/og-image.jpg" />

<!-- Canonical (for SEO) -->
<link rel="canonical" href="{{canonical_url}}" />
