name: Link check

# Verifies every live_url / repo_url in dashboard/data/examples.json still
# returns 2xx/3xx. Catches silent link rot when a past-project repo gets
# renamed, archived, or goes offline. See scripts/linkcheck.py.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/data/examples.json'
      - 'scripts/linkcheck.py'
      - '.github/workflows/linkcheck.yml'
  pull_request:
    paths:
      - 'dashboard/data/examples.json'
      - 'scripts/linkcheck.py'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run link checker
        run: python3 scripts/linkcheck.py
