<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dt-site-creator favicon — DT monogram in amber on dark slate. -->
  <!-- Theme-adaptive: amber/dark in OS dark mode, slate/amber in light mode. -->
  <style>
    .bg { fill: #0d1117; }
    .fg { fill: #ffa657; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffa657; }
      .fg { fill: #0d1117; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" />
  <text x="16" y="22" class="fg"
        font-family="-apple-system, 'SF Pro', 'Helvetica Neue', Arial Black, sans-serif"
        font-weight="900" font-size="16" text-anchor="middle">DT</text>
</svg>
