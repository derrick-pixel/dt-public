<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- OG / WhatsApp / Twitter / LinkedIn share image
       1200x630 · Regulatory Parchment palette
       Composition mirrors the site hero: document feel, navy + copper accents -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF7F0"/>

  <!-- Subtle engineering grid (matching hero) -->
  <g opacity="0.06" stroke="#143965" stroke-width="1">
    <path d="M0 56 H1200 M0 112 H1200 M0 168 H1200 M0 224 H1200 M0 280 H1200 M0 336 H1200 M0 392 H1200 M0 448 H1200 M0 504 H1200 M0 560 H1200"/>
    <path d="M56 0 V630 M112 0 V630 M168 0 V630 M224 0 V630 M280 0 V630 M336 0 V630 M392 0 V630 M448 0 V630 M504 0 V630 M560 0 V630 M616 0 V630 M672 0 V630 M728 0 V630 M784 0 V630 M840 0 V630 M896 0 V630 M952 0 V630 M1008 0 V630 M1064 0 V630 M1120 0 V630 M1176 0 V630"/>
  </g>

  <!-- Top hairline + folio -->
  <line x1="64" y1="64" x2="1136" y2="64" stroke="#143965" stroke-width="1"/>
  <text x="64" y="50" fill="#5A6378" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2.4">DOCUMENT 01 · STRATEGIC PROFILE · v0.1 · MAY 2026</text>
  <text x="1136" y="50" fill="#C9621D" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2.4">CONFIDENTIAL</text>

  <!-- Eyebrow -->
  <g transform="translate(64, 142)">
    <rect width="40" height="2" fill="#C9621D"/>
    <text x="58" y="6" fill="#C9621D" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2.8">A REGULATED TALENT-SUPPLY VERTICAL</text>
  </g>

  <!-- Hero headline (Source Serif 4 italic, hand-set per line for line breaks) -->
  <g fill="#14213D" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="72" letter-spacing="-2.5">
    <text x="64" y="240">Singapore's <tspan font-style="italic" fill="#143965">licensed</tspan></text>
    <text x="64" y="312">site supervision <tspan font-style="italic" fill="#C9621D">firm</tspan> —</text>
    <text x="64" y="384">built before the <tspan font-style="italic" fill="#143965">2028</tspan> deadline.</text>
  </g>

  <!-- Stat strip — 4 tabs across the bottom -->
  <g transform="translate(64, 458)">
    <line x1="0" y1="0" x2="1072" y2="0" stroke="#143965" stroke-width="2"/>

    <g transform="translate(0, 24)">
      <text x="0" y="14" fill="#5A6378" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">2026 CONTRACTS</text>
      <text x="0" y="62" fill="#143965" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="42" letter-spacing="-1.2">S$50B</text>
      <text x="0" y="92" fill="#5A6378" font-family="Inter, system-ui" font-size="13">BCA · Jan 2026</text>
    </g>

    <g transform="translate(280, 24)">
      <text x="0" y="14" fill="#5A6378" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">CIVIL ENG. 2026</text>
      <text x="0" y="62" fill="#143965" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="42" letter-spacing="-1.2">S$11.6–13.4B</text>
      <text x="0" y="92" fill="#5A6378" font-family="Inter, system-ui" font-size="13">Record vs. S$9.3B 2025</text>
    </g>

    <g transform="translate(620, 24)">
      <text x="0" y="14" fill="#5A6378" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">OUTSOURCED TAM</text>
      <text x="0" y="62" fill="#143965" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="42" letter-spacing="-1.2">S$110–170M</text>
      <text x="0" y="92" fill="#5A6378" font-family="Inter, system-ui" font-size="13">Triangulated</text>
    </g>

    <g transform="translate(896, 24)">
      <text x="0" y="14" fill="#5A6378" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2">YEAR-3 TARGET</text>
      <text x="0" y="62" fill="#143965" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="42" letter-spacing="-1.2">200–300</text>
      <text x="0" y="92" fill="#5A6378" font-family="Inter, system-ui" font-size="13">Deployed headcount</text>
    </g>
  </g>

  <!-- Bottom band: brand mark + parent group -->
  <line x1="64" y1="558" x2="1136" y2="558" stroke="#E5DDD0" stroke-width="1"/>
  <g transform="translate(64, 590)">
    <text x="0" y="0" fill="#C9621D" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2.8">ELITEZ</text>
    <line x1="58" y1="-4" x2="58" y2="-15" stroke="#D4C8B5" stroke-width="1"/>
    <text x="68" y="0" fill="#14213D" font-family="Source Serif 4, Georgia, serif" font-weight="700" font-size="18" letter-spacing="-0.4">Site Supervisor</text>
  </g>

  <!-- Parent-Group lockup, right side. Orange dot acts as a visual
       sub-brand seal preceding the parent-group line, not overlapping text. -->
  <g transform="translate(1136, 590)">
    <text x="0" y="0" fill="#5A6378" font-family="Inter, system-ui" font-size="11" font-weight="500" letter-spacing="2.4" text-anchor="end">UNDER ELITEZ GROUP — EST. MMXI</text>
  </g>
</svg>
