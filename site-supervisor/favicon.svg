<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Elitez Site Supervisor favicon
       Proposal navy ground · parchment E · structural copper bar
       Group-orange dot (top right) subordinates to Elitez Group brand.
       Designed to read at 16×16 — no fine detail. -->
  <rect width="64" height="64" rx="10" ry="10" fill="#143965"/>
  <!-- "E" letterform in parchment.
       Hand-tuned bars; geometric (no serif noise) so 16px stays legible. -->
  <g fill="#FAF7F0">
    <rect x="16" y="14" width="32" height="6.5"/>
    <rect x="16" y="14" width="6.5" height="36"/>
    <rect x="16" y="29.25" width="24" height="5.5"/>
    <rect x="16" y="43.5" width="32" height="6.5"/>
  </g>
  <!-- Copper accent bar — site palette continuity -->
  <rect x="16" y="55" width="32" height="2" fill="#C9621D"/>
  <!-- Parent-Group orange dot — subordination signal -->
  <circle cx="52" cy="12" r="4" fill="#F97316"/>
</svg>
