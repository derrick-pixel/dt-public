<div class="last-edited-strip" role="status" aria-live="polite">
  <strong>Page last edited:</strong> <span id="last-edited" data-edited="2026-04-29T15:53:46+08:00">checking…</span>
</div>


  <main class="container-wide">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>Full Report Preview</h1>
      <button id="download-btn" style="padding: 12px 24px; background: var(--brand-primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">Generate PDF</button>
    </div>
    <div id="progress" style="display: none; margin: 16px 0;"><progress id="progress-bar" max="100" value="0" style="width: 100%;"></progress> <span id="progress-text"></span></div>
    <div id="pdf-root" class="pdf-root"></div>
  </main>

  <script type="module">
    import { loadAppData, mountSampleBanner } from './assets/js/app.js';
    import { buildSections, renderPages } from './assets/js/report/page-templates.js';
    import { generatePDF } from './assets/js/report/pdf-generator.js';

    const data = await loadAppData('./data');
    mountSampleBanner();

    const root = document.getElementById('pdf-root');
    const sections = buildSections(data);
    renderPages(root, sections, data);

    document.getElementById('download-btn').addEventListener('click', async () => {
      const progress = document.getElementById('progress');
      const bar = document.getElementById('progress-bar');
      const txt = document.getElementById('progress-text');
      progress.style.display = 'block';
      const slug = data.competitors.meta.project_name.replace(/\s+/g, '-').toLowerCase();
      await generatePDF({
        root,
        filename: `${slug}-competitive-intelligence-${data.competitors.meta.research_date}.pdf`,
        onProgress: (done, total) => { bar.value = (done / total) * 100; txt.textContent = `Rasterising page ${done} of ${total}…`; }
      });
      progress.style.display = 'none';
    });
  </script>

<script>
(function () {
  const el = document.getElementById('last-edited');
  if (!el) return;
  const iso = el.dataset.edited;
  if (!iso) { el.textContent = '—'; return; }
  const d = new Date(iso);
  const fmt = d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
  const ago = Math.floor((Date.now() - d.getTime()) / 86400000);
  let suffix;
  if (ago === 0) suffix = 'today';
  else if (ago === 1) suffix = 'yesterday';
  else if (ago < 14) suffix = ago + ' days ago';
  else if (ago < 60) suffix = Math.floor(ago/7) + ' weeks ago';
  else suffix = Math.floor(ago/30) + ' months ago';
  el.textContent = fmt + ' · ' + suffix;
  if (ago <= 7) el.classList.add('fresh');
  else if (ago > 14) el.classList.add('stale');
})();
</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
