<div class="last-edited-strip" role="status" aria-live="polite">
  <strong>Page last edited:</strong> <span id="last-edited" data-edited="2026-04-29T15:53:46+08:00">checking…</span>
</div>

  <main class="container-wide">
    <h1>Website Design Audit</h1>
    <p>Each competitor rated on 5 dimensions, weighted-average to a single 1–10 score. Dimensions ≤ 6 require a written note.</p>
    <div id="gallery" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px; margin-top: 32px;"></div>
  </main>
  <script type="module">
    import { loadAppData, mountSampleBanner } from './assets/js/app.js';
    import { h, mount } from './assets/js/dom.js';
    const { competitors } = await loadAppData();
    mountSampleBanner();
    const sorted = [...competitors.competitors].sort((a, b) => (b.website_design_rating ?? 0) - (a.website_design_rating ?? 0));
    mount(document.getElementById('gallery'), ...sorted.map(c =>
      h('div', { class: 'top5-card' },
        h('h3', {},
          c.name,
          h('span', { style: { float: 'right', background: 'var(--brand-primary)', color: 'white', padding: '2px 8px', borderRadius: '4px', fontSize: '16px' } }, `${c.website_design_rating ?? '—'}/10`)
        ),
        h('p', { style: { opacity: '0.7', fontSize: '13px' } }, c.url),
        c.website_screenshot_path
          ? h('img', { src: c.website_screenshot_path, alt: c.name, style: { width: '100%', borderRadius: '4px', margin: '12px 0' } })
          : null,
        h('p', {}, c.website_design_notes || 'No notes.')
      )
    ));
  </script>

<script>
(function () {
  const el = document.getElementById('last-edited');
  if (!el) return;
  const iso = el.dataset.edited;
  if (!iso) { el.textContent = '—'; return; }
  const d = new Date(iso);
  const fmt = d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
  const ago = Math.floor((Date.now() - d.getTime()) / 86400000);
  let suffix;
  if (ago === 0) suffix = 'today';
  else if (ago === 1) suffix = 'yesterday';
  else if (ago < 14) suffix = ago + ' days ago';
  else if (ago < 60) suffix = Math.floor(ago/7) + ' weeks ago';
  else suffix = Math.floor(ago/30) + ' months ago';
  el.textContent = fmt + ' · ' + suffix;
  if (ago <= 7) el.classList.add('fresh');
  else if (ago > 14) el.classList.add('stale');
})();
</script>
