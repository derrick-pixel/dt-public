<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .ink { fill: #1A1A1A; }
      .cream { fill: #FEF3E7; }
      .coral { fill: #FF5B39; }
      .violet { fill: #A78BFA; }
      .mustard { fill: #FFD700; }
      .h1 { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
      .body { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" class="cream"/>

  <!-- Decorative violet circle (top-right blob) -->
  <circle cx="1080" cy="120" r="180" class="violet" opacity="0.55"/>

  <!-- Decorative mustard scribble star (bottom-right) -->
  <g transform="translate(1020, 520) rotate(12)">
    <polygon points="0,-40 11,-12 40,-12 17,5 26,32 0,18 -26,32 -17,5 -40,-12 -11,-12" class="mustard" stroke="#1A1A1A" stroke-width="3"/>
  </g>

  <!-- Sticker pill — PULSE wordmark -->
  <!-- Drop shadow (violet sticker offset) -->
  <rect x="74" y="74" width="280" height="76" rx="38" class="violet"/>
  <!-- Coral pill -->
  <rect x="70" y="70" width="280" height="76" rx="38" class="coral" stroke="#1A1A1A" stroke-width="3"/>
  <text x="100" y="122" font-size="38" letter-spacing="3" class="h1" fill="#FEF3E7">PULSE</text>
  <text x="245" y="122" font-size="38" class="h1" fill="#FFD700">★</text>

  <!-- Headline — main message (matches live site) -->
  <text x="70" y="280" font-size="92" class="h1 ink">Lead gen but</text>
  <!-- Mustard highlight behind "actually fun" -->
  <rect x="60" y="320" width="700" height="90" class="mustard"/>
  <text x="70" y="390" font-size="92" class="h1 ink">actually fun.</text>

  <!-- Sub-tagline -->
  <text x="70" y="470" font-size="34" class="body ink">Bundled marketing retainers for SMEs.</text>

  <!-- Pricing strip -->
  <text x="70" y="520" font-size="22" class="body ink">From SGD 799 / month  ·  Singapore + Malaysia</text>

  <!-- Footer mono -->
  <text x="70" y="580" font-size="18" class="mono ink">elitez-pulse  ·  part of Elitez Group</text>

  <!-- Tiny coral dot accents -->
  <circle cx="950" cy="470" r="8" class="coral"/>
  <circle cx="980" cy="490" r="5" class="ink"/>
</svg>
