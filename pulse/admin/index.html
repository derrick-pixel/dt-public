  <style>

  /* ── MOBILE RESPONSIVE OVERRIDES (v2) ─────────────────── */
  @media (max-width: 768px) {
    body { font-size: 13px; }
    h1, .page-title, .atlas-title, .ph h1 { font-size: 1.45rem !important; line-height: 1.2 !important; }
    h2, .art-title, .section-title, .sec-h h2 { font-size: 1.05rem !important; line-height: 1.25 !important; }
    h3 { font-size: 0.95rem !important; }
    .page-meta, .atlas-meta, .topbar-meta { text-align: left !important; margin-top: 6px !important; font-size: 0.7rem !important; }
    main, .container, .container-wide, .atlas-body, .page-body, .wrap, .page { padding-left: 14px !important; padding-right: 14px !important; }
    .page-head, .atlas-top, .admin-header { flex-direction: column !important; align-items: flex-start !important; gap: 6px !important; }

    /* Grids collapse to single column */
    .kpi-strip, .kpis, .summary-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; margin-bottom: 20px !important; }
    .grid-2, .grid-3, .grid-4, .landscape-grid, .rationale-grid, .tier-strip, .top-list,
    .attack-grid, .results-grid, .metrics-grid { grid-template-columns: 1fr !important; gap: 12px !important; }

    /* All cards: tighter */
    .kpi, .summary-card, .stat-card, .comp-card, .landscape-card, .rationale-card,
    .tier, .model, .sent-card, .insight, .alert, .quote, .card,
    .niche { padding: 14px 16px !important; border-radius: 10px !important; }
    .kpi-val, .kpi .v, .summary-card .big, .stat-value { font-size: 1.35rem !important; line-height: 1.1 !important; }
    .kpi-lbl, .kpi .l, .summary-card .sub, .stat-label { font-size: 0.6rem !important; letter-spacing: 0.06em !important; }

    /* Artifact sections */
    .artifact, section.panel, .landscape-section { padding: 18px 16px !important; margin-bottom: 14px !important; border-radius: 10px !important; }
    .art-desc, .sec-h p { font-size: 0.82rem !important; margin-bottom: 14px !important; }

    /* Strategy canvas + charts */
    #strategy-canvas, .chart-wrap canvas, .radar-svg { height: 280px !important; max-height: 320px !important; width: 100% !important; }
    .canvas-wrap { grid-template-columns: 1fr !important; gap: 14px !important; }
    .canvas-legend { font-size: 0.72rem !important; }
    .canvas-legend .leg { gap: 6px !important; }
    .chart-wrap { padding: 14px !important; }

    /* Heatmap (whitespace) */
    .heatmap-wrap { border-radius: 6px !important; overflow-x: auto !important; }
    .heatmap { min-width: auto !important; font-size: 0.56rem !important; }
    .heatmap thead th { padding: 6px 3px !important; font-size: 0.5rem !important; letter-spacing: 0.02em !important; }
    .heatmap thead th:first-child { min-width: 118px !important; text-align: left !important; }
    .heatmap tbody th { font-size: 0.66rem !important; padding: 6px 8px !important; min-width: 118px !important; }
    .heatmap tbody th small { font-size: 0.54rem !important; margin-top: 1px !important; }
    .heatmap td { padding: 4px 2px !important; font-size: 0.72rem !important; }
    .heatmap-legend { gap: 10px !important; font-size: 0.7rem !important; }
    .heatmap-legend .dot { width: 10px !important; height: 10px !important; }

    /* Attack niches (whitespace) */
    .niche-name { font-size: 0.98rem !important; }
    .niche-icp { font-size: 0.82rem !important; margin-bottom: 10px !important; padding-bottom: 10px !important; }
    .niche-row { grid-template-columns: 60px 1fr !important; gap: 8px !important; font-size: 0.76rem !important; }
    .niche-row .k { font-size: 0.58rem !important; letter-spacing: 0.05em !important; }

    /* Competitor controls */
    .comp-controls, .filter-bar { gap: 8px !important; margin-bottom: 10px !important; flex-wrap: wrap !important; }
    .comp-search, .filter-bar input[type="search"], .filter-bar input[type="text"] { width: 100% !important; min-width: 100% !important; }
    .comp-filter, .filter-bar select { flex: 1 1 calc(50% - 4px) !important; min-width: calc(50% - 4px) !important; }
    .comp-count { font-size: 0.7rem !important; width: 100% !important; }

    /* Generic tables: always scroll horizontally inside the card */
    .tbl-wrap, .table-wrapper, .table-wrap, .tbl { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
    table { display: block !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; font-size: 0.7rem !important; white-space: nowrap !important; }
    table thead, table tbody, table tr { display: table !important; width: 100% !important; min-width: 640px !important; table-layout: auto !important; }
    table thead th, .comp-table thead th { font-size: 0.55rem !important; padding: 8px !important; letter-spacing: 0.03em !important; white-space: normal !important; }
    table tbody td, .comp-table tbody td { padding: 8px !important; white-space: normal !important; font-size: 0.76rem !important; }

    /* Comp-table specifics */
    .comp-name { font-size: 0.82rem !important; }
    .comp-target { font-size: 0.7rem !important; }
    .badge, .region-badge, .tier-badge { font-size: 0.56rem !important; padding: 2px 6px !important; letter-spacing: 0.02em !important; }

    /* Bar-chart rows (AEVUM admin) */
    .bar-chart { padding: 0 !important; }
    .bar-row { grid-template-columns: 1fr !important; gap: 4px !important; padding: 8px 0 !important; }
    .bar-row .val { text-align: left !important; }

    /* Login overlay (altru/passage) */
    .login-box { padding: 32px 24px !important; max-width: calc(100vw - 32px) !important; }
    .login-logo { font-size: 1.5rem !important; }

    /* Admin navs — wrap */
    nav, .admin-nav, .atlas-nav, .topbar, .topbar-inner { flex-wrap: wrap !important; padding: 10px 14px !important; gap: 8px !important; }
    .admin-nav { gap: 10px !important; }
    .atlas-nav-links, .admin-links, .topbar-tabs { flex-wrap: wrap !important; gap: 6px !important; }
    .atlas-nav-links a, .admin-links a, .topbar-tabs a { font-size: 0.72rem !important; padding: 5px 10px !important; }

    /* SPA admin rail (EMS elitez-pulse) */
    .admin-layout { grid-template-columns: 1fr !important; }
    .admin-rail { position: static !important; height: auto !important; width: 100% !important; padding: 14px !important; margin-bottom: 10px !important; }
    .admin-rail__tab, .admin-rail__link { display: inline-block !important; margin-right: 6px !important; font-size: 0.8rem !important; padding: 6px 10px !important; }
    .admin-main { padding: 14px !important; }

    /* Admin sidebar (the-commons admin) */
    .dashboard, .admin-main, aside.sidebar { grid-template-columns: 1fr !important; }
    aside.sidebar, .admin-sidebar { position: static !important; height: auto !important; width: 100% !important; padding: 14px !important; margin-bottom: 10px !important; }
    .sidebar-nav { display: flex !important; flex-wrap: wrap !important; gap: 4px !important; }
    .sidebar-nav li { display: inline-block !important; }
    .sidebar-nav a { font-size: 0.76rem !important; padding: 6px 10px !important; }
    .main-content { padding: 0 !important; }

    /* Event hero / PayNow modal on mobile */
    .ev-hero-wrap { height: 220px !important; }
    .modal { padding: 20px 16px !important; max-width: calc(100vw - 24px) !important; }
    .modal h3 { font-size: 1.05rem !important; }

    /* Steps indicator (create.html) */
    .steps { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }
    .step-connector { display: none !important; }

    /* Navigation logo padding */
    .nav-inner { padding: 10px 14px !important; }
    .nav-inner .nav-links { display: none !important; }
    .mobile-toggle { display: inline-flex !important; }

    /* Forms */
    .form-row { grid-template-columns: 1fr !important; gap: 12px !important; }
    .form-group label { font-size: 0.8rem !important; }

    /* Footer */
    .footer-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
  }

  @media (max-width: 420px) {
    .kpi-strip, .kpis, .summary-grid { grid-template-columns: 1fr !important; }
    .heatmap thead th:first-child,
    .heatmap tbody th { min-width: 108px !important; }
    .niche-row { grid-template-columns: 56px 1fr !important; font-size: 0.74rem !important; }
    body { font-size: 12px; }
    .kpi-val, .kpi .v, .summary-card .big, .stat-value { font-size: 1.2rem !important; }
    .comp-filter, .filter-bar select { flex: 1 1 100% !important; min-width: 100% !important; }
  }
  /* ── END MOBILE OVERRIDES ─────────────────────────────── */

  </style>
