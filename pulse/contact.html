<!DOCTYPE html>
<html lang="en" data-theme="sticker">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Talk to us — Elitez Pulse</title>
  <meta name="description" content="Tell us your situation. We'll sketch your ROI break-even in 20 minutes.">
  <meta property="og:title" content="Talk to us — Elitez Pulse">
  <meta property="og:image" content="assets/og-1200x630.png">
  <link rel="icon" href="assets/favicon/favicon.ico">
  <link id="theme-css" rel="stylesheet" href="assets/theme.css">
  <link rel="stylesheet" href="assets/base.css">
  <link rel="stylesheet" href="assets/components.css">
  <style>
    .form { max-width: 540px; }
    .form label { display:block; margin:16px 0 6px; font-weight:700; font-size:14px; }
    .form input, .form select, .form textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--ink);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 15px;
      background: var(--white);
    }
    .form textarea { min-height: 120px; resize: vertical; }
    .success { padding: 24px; background: var(--mustard); border-radius: var(--radius-md); font-weight: 700; border: 2px solid var(--ink); box-shadow: var(--shadow-sticker); }
  </style>
<script type="application/ld+json" data-injected="schema-jsonld">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Elitez Pulse",
  "url": "https://derrickteo.com/pulse/",
  "description": "Bundled marketing retainers for SMEs in Singapore and Malaysia. Structured lead-generation systems from SGD 799 per month."
}
</script>
<script type="application/ld+json" data-injected="schema-jsonld">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Elitez Pulse",
  "url": "https://derrickteo.com/pulse/"
}
</script>
  <meta name="robots" content="noindex, nofollow">
</head>
<body data-base=".">
<main>
  <div data-nav></div>

  <section class="section">
    <div class="container">
      <h1>Let's <span class="scribble">talk numbers.</span></h1>
      <p class="hero__sub">20 minutes. We'll sketch your ROI break-even live. No pitch deck.</p>

      <form class="form" id="contact-form" style="margin-top:32px;" novalidate>
        <label>Your name <input type="text" name="name" required autocomplete="name"></label>
        <label>Company <input type="text" name="company" required autocomplete="organization"></label>
        <label>Work email <input type="email" name="email" required autocomplete="email"></label>
        <label>Package you're eyeing
          <select name="pkg">
            <option value="">Not sure yet</option>
            <option value="entry">Entry (SGD 799 / mo)</option>
            <option value="core">Core (SGD 1,499 / mo)</option>
            <option value="premium">Premium (SGD 2,999 / mo)</option>
          </select>
        </label>
        <label>What's the situation?
          <textarea name="message" placeholder="Tell us what's broken or what you want to grow..."></textarea>
        </label>
        <button type="submit" class="btn btn--primary" style="margin-top:24px;">Send it →</button>
      </form>

      <div id="success" class="success" style="display:none; margin-top:24px;">
        ✦ Got it. We'll email you within one working day from pulse@elitez.asia.
      </div>
    </div>
  </section>

  <div data-footer></div>

  <script type="module" src="js/common.js?v=3"></script>
  <script type="module" src="js/contact.js?v=1"></script>
</main>
</body>
</html>
