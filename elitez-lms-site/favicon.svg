<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Elitez">
  <style>
    .bg { fill: #fafafa; }
    .fg { fill: #003a70; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a1a2e; }
      .fg { fill: #fafafa; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="64" height="64" rx="8" ry="8"/>
  <!-- Person mark: circle head + horizontal cross-bar + vertical column -->
  <circle class="fg" cx="32" cy="18" r="5.5"/>
  <rect class="fg" x="14" y="26" width="36" height="6" rx="1"/>
  <rect class="fg" x="29" y="26" width="6" height="24" rx="1"/>
</svg>
