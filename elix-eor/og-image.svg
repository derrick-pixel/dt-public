<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#060E1F"/>
      <stop offset="50%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#0F2444"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00E68A" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00E68A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFB84D" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#FFB84D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E68A"/>
      <stop offset="100%" stop-color="#FFB84D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1150" cy="80" r="320" fill="url(#glowGreen)"/>
  <circle cx="40"   cy="600" r="280" fill="url(#glowAmber)"/>

  <!-- Badge pill -->
  <rect x="100" y="118" width="378" height="36" rx="18" ry="18"
        fill="#00E68A" fill-opacity="0.12"/>
  <text x="289" y="142" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" letter-spacing="1.0" fill="#00E68A"
        text-anchor="middle">EMPLOYER OF RECORD &#8226; SINGAPORE</text>

  <!-- Title -->
  <text x="100" y="248" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="900" fill="#F0F4F8" letter-spacing="-1.5">Stop Drowning in</text>
  <text x="100" y="320" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="900" fill="url(#grad)" letter-spacing="-1.5">CPF, WICA &amp; IR8A</text>

  <!-- Subtitle -->
  <text x="100" y="378" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#8FA3C4">$30/month flat fee. Group-rate benefits. Turn your payroll</text>
  <text x="100" y="408" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#8FA3C4">into business class flights with CardUp.</text>

  <!-- Divider -->
  <line x1="100" y1="450" x2="700" y2="450" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Stats -->
  <text x="100" y="496" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="800" fill="#00E68A">$30</text>
  <text x="100" y="520" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#6B7FA0" letter-spacing="1">PER MONTH</text>

  <text x="240" y="496" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="800" fill="#00E68A">~92K</text>
  <text x="240" y="520" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#6B7FA0" letter-spacing="1">MILES / YEAR</text>

  <text x="400" y="496" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="800" fill="#00E68A">0 hrs</text>
  <text x="400" y="520" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#6B7FA0" letter-spacing="1">ADMIN WORK</text>

  <!-- Wordmark + powered-by -->
  <text x="1140" y="572" text-anchor="end"
        font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="28" font-weight="800">
    <tspan fill="#00E68A">Elitez</tspan>
    <tspan dx="6" fill="#6B7FA0" font-weight="500">EOR</tspan>
  </text>
  <text x="1140" y="594" text-anchor="end"
        font-family="Inter, -apple-system, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#6B7FA0">Powered by Elitez Group</text>
</svg>
