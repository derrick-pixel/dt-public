<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .og {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #060E1F 0%, #0B1D3A 50%, #0F2444 100%);
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px 100px; font-family: 'Inter', -apple-system, sans-serif;
    position: relative; overflow: hidden;
  }
  .og::before {
    content: ''; position: absolute; right: -100px; top: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,230,138,0.12) 0%, transparent 70%);
  }
  .og::after {
    content: ''; position: absolute; left: -80px; bottom: -80px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,184,77,0.08) 0%, transparent 70%);
  }
  .badge {
    display: inline-block; padding: 6px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(0,230,138,0.12); color: #00E68A;
    margin-bottom: 24px;
  }
  .title {
    font-size: 64px; font-weight: 900; color: #F0F4F8;
    letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .gradient {
    background: linear-gradient(135deg, #00E68A, #FFB84D);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 22px; color: #8FA3C4; line-height: 1.5;
    max-width: 700px; position: relative; z-index: 1;
  }
  .stats {
    display: flex; gap: 48px; margin-top: 36px;
    position: relative; z-index: 1;
    padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .stat-value { font-size: 32px; font-weight: 800; color: #00E68A; }
  .stat-label { font-size: 12px; color: #6B7FA0; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .logo {
    position: absolute; bottom: 40px; right: 60px;
    font-size: 18px; font-weight: 800; z-index: 1;
  }
  .logo .elix { color: #00E68A; }
  .logo .eor { color: #6B7FA0; font-weight: 500; }
  .logo .powered { font-size: 11px; color: #6B7FA0; margin-top: 4px; font-weight: 400; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <!-- Favicon set -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#ffffff" />
  <meta name="theme-color" content="#b91c1c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
<div class="og">
  <div class="badge">Employer of Record &bull; Singapore</div>
  <div class="title">Stop Drowning in<br><span class="gradient">CPF, WICA & IR8A</span></div>
  <div class="subtitle">$30/month flat fee. Group-rate benefits. Turn your payroll into business class flights with CardUp.</div>
  <div class="stats">
    <div><div class="stat-value">$30</div><div class="stat-label">Per month</div></div>
    <div><div class="stat-value">~92K</div><div class="stat-label">Miles / year</div></div>
    <div><div class="stat-value">0 hrs</div><div class="stat-label">Admin work</div></div>
  </div>
  <div class="logo">
    <div><span class="elix">ELIX</span> <span class="eor">EOR</span></div>
    <div class="powered">Powered by Elitez Group</div>
  </div>
</div>
</body>
</html>
