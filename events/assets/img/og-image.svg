<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bowl" cx="70%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#FF8A2C"/>
      <stop offset="40%" stop-color="#FF6A00"/>
      <stop offset="80%" stop-color="#2A211A"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD9A8"/>
      <stop offset="60%" stop-color="#FF8A2C"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bowl)"/>

  <!-- Bokeh dots -->
  <g fill="#FFFFFF" opacity="0.10">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="930" cy="180" r="2.5"/>
    <circle cx="1080" cy="380" r="3"/>
    <circle cx="280" cy="480" r="3.5"/>
    <circle cx="640" cy="80" r="2"/>
    <circle cx="780" cy="540" r="2.5"/>
    <circle cx="520" cy="280" r="2"/>
  </g>

  <!-- Logo wordmark on top-left -->
  <g transform="translate(72, 70)" fill="#FFF7EE" font-family="'Manrope','Helvetica Neue',sans-serif" font-weight="900">
    <text font-size="44" letter-spacing="2">EL</text>
    <text x="56" font-size="44" letter-spacing="0">I</text>
    <circle cx="84" cy="-32" r="4.5"/>
    <rect x="80" y="-26" width="8" height="36" rx="1.5"/>
    <rect x="68" y="-13" width="32" height="6" rx="1.5"/>
    <text x="106" font-size="44" letter-spacing="2">EZ</text>
    <text y="36" font-size="14" letter-spacing="6" font-family="'Playfair Display',Georgia,serif" font-weight="500">EVENTS</text>
  </g>

  <!-- Headline -->
  <text x="72" y="320" fill="#FFF7EE" font-family="'Manrope','Helvetica Neue',sans-serif" font-weight="800" font-size="84" letter-spacing="-2">Memorable</text>
  <text x="72" y="412" fill="url(#grad)" font-family="'Manrope','Helvetica Neue',sans-serif" font-weight="800" font-size="84" letter-spacing="-2">corporate events.</text>

  <!-- Tagline -->
  <text x="72" y="476" fill="rgba(255,247,238,0.86)" font-family="'Playfair Display',Georgia,serif" font-style="italic" font-size="28">Singapore · Backed by Elitez Group · Since 2021</text>

  <!-- Stats row -->
  <g font-family="'Manrope','Helvetica Neue',sans-serif">
    <line x1="72" y1="540" x2="1128" y2="540" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <g transform="translate(72, 562)" fill="#FFF7EE">
      <text font-size="32" font-weight="800" fill="#FF6A00">100+</text>
      <text x="0" y="32" font-size="12" letter-spacing="2" font-weight="700" opacity="0.6">EVENTS DELIVERED</text>
    </g>
    <g transform="translate(360, 562)" fill="#FFF7EE">
      <text font-size="32" font-weight="800" fill="#FF6A00">35+</text>
      <text x="0" y="32" font-size="12" letter-spacing="2" font-weight="700" opacity="0.6">RECURRING CLIENTS</text>
    </g>
    <g transform="translate(620, 562)" fill="#FFF7EE">
      <text font-size="32" font-weight="800" fill="#FF6A00">1,500</text>
      <text x="0" y="32" font-size="12" letter-spacing="2" font-weight="700" opacity="0.6">LARGEST PAX</text>
    </g>
    <g transform="translate(880, 562)" fill="#FFF7EE">
      <text font-size="32" font-weight="800" fill="#FF6A00">6</text>
      <text x="0" y="32" font-size="12" letter-spacing="2" font-weight="700" opacity="0.6">SERVICE LINES</text>
    </g>
  </g>
</svg>
