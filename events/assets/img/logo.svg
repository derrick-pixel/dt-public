<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 129" role="img" aria-label="Elitez">
  <!--
    ELITEZ wordmark — block-letter trace of the official mark.
    Orange letters: E L I [figure] E Z, where the T is replaced by a stylised
    standing person (circle head + vertical body + horizontal arms).
    Tuned to match the 576×129 reference PNG; pure rect primitives so it
    scales crisply and themes cleanly via the two fill groups below.
  -->
  <g fill="#FF6A00">
    <!-- E -->
    <rect x="0"   y="0"    width="100" height="26"/>
    <rect x="0"   y="0"    width="26"  height="129"/>
    <rect x="0"   y="51"   width="84"  height="26"/>
    <rect x="0"   y="103"  width="100" height="26"/>
    <!-- L -->
    <rect x="110" y="0"    width="26"  height="129"/>
    <rect x="110" y="103"  width="92"  height="26"/>
    <!-- I -->
    <rect x="212" y="0"    width="26"  height="129"/>
    <!-- E -->
    <rect x="372" y="0"    width="100" height="26"/>
    <rect x="372" y="0"    width="26"  height="129"/>
    <rect x="372" y="51"   width="84"  height="26"/>
    <rect x="372" y="103"  width="100" height="26"/>
    <!-- Z -->
    <rect x="482" y="0"    width="94"  height="26"/>
    <rect x="482" y="103"  width="94"  height="26"/>
    <polygon points="556,26 576,26 502,103 482,103"/>
  </g>
  <g fill="#0F5577">
    <!-- Standing person figure (replaces the T) -->
    <circle cx="297" cy="14" r="14"/>
    <rect x="284" y="32" width="26" height="97"/>
    <rect x="252" y="60" width="90" height="22"/>
  </g>
</svg>
