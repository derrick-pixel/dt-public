<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Elitez">
  <!--
    Favicon mark = the standing-person figure from the ELITEZ wordmark
    (the "human T" between I and EZ), centred on a rounded orange tile.
    Figure geometry mirrors logo.svg so the favicon reads as a zoom-in
    of the wordmark, not a separate symbol.
  -->
  <rect width="64" height="64" rx="14" fill="#FF6A00"/>
  <g fill="#0F5577" transform="translate(32 32) scale(0.388) translate(-297 -64.5)">
    <circle cx="297" cy="14" r="14"/>
    <rect x="284" y="32" width="26" height="97"/>
    <rect x="252" y="60" width="90" height="22"/>
  </g>
</svg>
