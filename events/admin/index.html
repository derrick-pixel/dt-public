  <main class="container-wide">
    <h1>Competitor Landscape</h1>
    <p id="count-line" style="opacity: 0.7;"></p>

    <section style="margin: 32px 0;">
      <h2>Top 5 threats</h2>
      <div id="top5-list"></div>
    </section>

    <section>
      <h2>Full competitor database</h2>
      <input type="search" class="search-bar" id="search-input" placeholder="Search by name, value prop, HQ, feature, strength…" aria-label="Search competitors">
      <div id="filters" style="display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;">
        <select name="filter-category" aria-label="Filter by category">
          <option value="">All categories</option>
          <option value="global_incumbent">Global incumbent</option>
          <option value="sg_local">SG local</option>
          <option value="regional_challenger">Regional challenger</option>
          <option value="diy_alternative">DIY alternative</option>
          <option value="adjacent">Adjacent</option>
          <option value="big_si">Big SI</option>
        </select>
        <select name="filter-hqRegion" aria-label="Filter by HQ region">
          <option value="">All regions</option>
          <option value="SEA">SEA</option>
          <option value="Global">Global</option>
          <option value="APAC">APAC</option>
          <option value="Other">Other</option>
        </select>
        <select name="filter-threatLevelMin" aria-label="Filter by minimum threat level">
          <option value="">Any threat level</option>
          <option value="3">≥ 3</option>
          <option value="4">≥ 4</option>
          <option value="5">= 5</option>
        </select>
      </div>
      <div style="overflow-x: auto;">
        <table class="competitor-table">
          <thead><tr>
            <th>Name</th><th>Category</th><th>HQ</th><th>Pricing posture</th><th>Threat</th><th>Beat</th><th>Design</th>
          </tr></thead>
          <tbody id="competitor-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { loadAppData, mountSampleBanner } from '../assets/js/app.js';
    import { wireSearch } from '../assets/js/viz/search.js';
    import { h, mount } from '../assets/js/dom.js';

    const data = await loadAppData();
    mountSampleBanner();
    const comps = data.competitors.competitors;
    const byId = Object.fromEntries(comps.map(c => [c.id, c]));

    const top5 = data.competitors.top_five.map(t => {
      const c = byId[t.competitor_id];
      return h('div', { class: 'top5-card' },
        h('h3', {},
          h('span', { class: 'rank' }, String(t.rank)),
          h('span', { style: { marginLeft: '12px' } }, c?.name ?? t.competitor_id)
        ),
        h('p', { class: 'rationale' }, t.rationale)
      );
    });
    mount(document.getElementById('top5-list'), ...top5);

    const tbody = document.getElementById('competitor-tbody');
    const countLine = document.getElementById('count-line');

    const designBadge = (r) => {
      if (r == null) return h('span', { class: 'badge badge-muted' }, 'n/a');
      // Audit uses 0-25 sum. Tier high >=20, mid 14-19, low <14.
      const cls = r >= 20 ? 'badge-success' : r >= 14 ? 'badge-amber' : 'badge-orange';
      return h('span', { class: `badge ${cls}` }, `${r}/25`);
    };

    const buildRow = c => h('tr', {},
      h('td', {}, h('a', { href: c.url, target: '_blank', rel: 'noopener' }, c.name)),
      h('td', {}, c.category),
      h('td', {}, c.hq),
      h('td', { title: c.pricing_range_published || '' },
        h('span', { class: `badge ${c.pricing_flag === 'public' ? 'badge-success' : c.pricing_flag === 'partial' ? 'badge-amber' : 'badge-muted'}` }, c.pricing_flag)
      ),
      h('td', {}, String(c.threat_level)),
      h('td', {}, String(c.beatability)),
      h('td', {}, designBadge(c.website_design_rating))
    );

    wireSearch({
      input: document.getElementById('search-input'),
      filtersEl: document.getElementById('filters'),
      competitors: comps,
      onUpdate: list => {
        mount(tbody, ...list.map(buildRow));
        countLine.textContent = `Showing ${list.length} of ${comps.length} competitors · ${data.competitors.meta.research_date}`;
      }
    });
  </script>

<script>
(function () {
  const el = document.getElementById('last-edited');
  if (!el) return;
  const iso = el.dataset.edited;
  if (!iso) { el.textContent = '—'; return; }
  const d = new Date(iso);
  const fmt = d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
  const ago = Math.floor((Date.now() - d.getTime()) / 86400000);
  let suffix;
  if (ago === 0) suffix = 'today';
  else if (ago === 1) suffix = 'yesterday';
  else if (ago < 14) suffix = ago + ' days ago';
  else if (ago < 60) suffix = Math.floor(ago/7) + ' weeks ago';
  else suffix = Math.floor(ago/30) + ' months ago';
  el.textContent = fmt + ' · ' + suffix;
  if (ago <= 7) el.classList.add('fresh');
  else if (ago > 14) el.classList.add('stale');
})();
</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
