<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D0812"/>
      <stop offset="50%" style="stop-color:#C8102E"/>
      <stop offset="100%" style="stop-color:#8B0020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9973A"/>
      <stop offset="100%" style="stop-color:#F0C060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="260" fill="rgba(255,255,255,0.03)"/>
  <circle cx="980" cy="120" r="190" fill="rgba(255,255,255,0.04)"/>
  <circle cx="200" cy="520" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- Gold top bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- 囍 logo mark -->
  <text x="100" y="280" font-family="serif" font-size="160" fill="rgba(255,255,255,0.12)">囍</text>

  <!-- Main logo symbol (centered left block) -->
  <text x="100" y="230" font-family="serif" font-size="90" fill="url(#accent)" filter="url(#glow)">囍</text>

  <!-- Altru wordmark -->
  <text x="230" y="230" font-family="Georgia, serif" font-size="88" font-weight="700" fill="white" letter-spacing="4">Altru</text>

  <!-- Tagline -->
  <text x="100" y="295" font-family="Georgia, serif" font-size="30" fill="rgba(255,255,255,0.75)" letter-spacing="1">Give at the wedding. Change a life.</text>

  <!-- Divider line -->
  <rect x="100" y="330" width="500" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="100" y="360" width="220" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="210" y="389" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🧧 Red Packet Gift</text>

  <!-- Pill 2 -->
  <rect x="335" y="360" width="230" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="450" y="389" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">💝 IPC Charity</text>

  <!-- Pill 3 -->
  <rect x="100" y="422" width="260" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="230" y="451" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🧾 250% Tax Relief</text>

  <!-- Pill 4 -->
  <rect x="375" y="422" width="190" height="46" rx="23" fill="rgba(255,255,255,0.12)"/>
  <text x="470" y="451" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">📱 PayNow</text>

  <!-- Big stat — right side -->
  <text x="820" y="270" font-family="Georgia, serif" font-size="120" font-weight="700" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">100%</text>
  <text x="820" y="315" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">TO CHARITY*</text>

  <!-- Small stat row -->
  <text x="680" y="390" font-family="Georgia, serif" font-size="38" font-weight="700" fill="white" text-anchor="middle">S$284K</text>
  <text x="820" y="390" font-family="Georgia, serif" font-size="38" font-weight="700" fill="white" text-anchor="middle">940+</text>
  <text x="960" y="390" font-family="Georgia, serif" font-size="38" font-weight="700" fill="white" text-anchor="middle">18</text>

  <text x="680" y="420" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)" text-anchor="middle">Raised</text>
  <text x="820" y="420" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)" text-anchor="middle">Weddings</text>
  <text x="960" y="420" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)" text-anchor="middle">Charities</text>

  <!-- Horizontal rule -->
  <rect x="600" y="448" width="500" height="1" fill="rgba(255,255,255,0.15)"/>

  <!-- URL / domain -->
  <text x="820" y="490" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="1">altru.asia</text>

  <!-- Gold bottom bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
