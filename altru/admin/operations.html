<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Operations Console — Altru</title>
  <style>
    :root { --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --navy:#003a70; --red:#C8102E; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; margin:0; color:var(--ink); background:#fafafa; padding-bottom:42px; }
    header { background:var(--navy); color:#fff; padding:1rem 1.5rem; }
    header h1 { margin:0; font-size:1.15rem; }
    header .sub { font-size:0.8rem; color:rgba(255,255,255,0.7); margin-top:0.2rem; }
    .counts { display:flex; gap:0.6rem; flex-wrap:wrap; padding:0.9rem 1.5rem; }
    .count { background:#fff; border:1px solid var(--line); border-radius:8px; padding:0.5rem 0.85rem; font-size:0.82rem; }
    .count b { font-size:1.1rem; display:block; color:var(--navy); }
    .count.warn b { color:var(--red); }
    .tabs { display:flex; gap:0.25rem; padding:0 1.5rem; border-bottom:1px solid var(--line); }
    .tab { background:none; border:0; padding:0.65rem 1rem; cursor:pointer; font-size:0.9rem; color:var(--muted); border-bottom:2px solid transparent; }
    .tab.active { color:var(--navy); border-bottom-color:var(--navy); font-weight:700; }
    main { padding:1.25rem 1.5rem; }
    .panel { display:none; }
    .panel.active { display:block; }
    .panel h2 { font-size:1rem; margin:1.25rem 0 0.5rem; color:var(--navy); }
    .panel h2:first-child { margin-top:0; }
    .filters { margin-bottom:0.6rem; }
    .filters button { background:#fff; border:1px solid var(--line); border-radius:6px; padding:0.3rem 0.7rem; cursor:pointer; font-size:0.8rem; margin-right:0.3rem; }
    .filters button.on { background:var(--navy); color:#fff; border-color:var(--navy); }
    table { width:100%; border-collapse:collapse; background:#fff; font-size:0.82rem; border:1px solid var(--line); }
    th { text-align:left; padding:0.5rem 0.6rem; background:#f3f4f6; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); }
    td { padding:0.5rem 0.6rem; border-top:1px solid var(--line); }
    td.amt { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .chip { display:inline-block; font-size:0.7rem; font-weight:700; padding:0.13rem 0.45rem; border-radius:999px; }
    .chip.ok { background:#dcfce7; color:#166534; }
    .chip.warn { background:#fef3c7; color:#92400e; }
    .chip.bad { background:#fee2e2; color:#991b1b; }
    .chip.mut { background:#f1f1f1; color:#555; }
    .act { background:var(--navy); color:#fff; border:0; border-radius:6px; padding:0.3rem 0.6rem; cursor:pointer; font-size:0.76rem; }
    .act.ghost { background:#fff; color:var(--navy); border:1px solid var(--navy); }
    .empty { color:var(--muted); font-size:0.85rem; padding:0.8rem 0; }
    .last-edited-strip {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      padding: 5px 14px; text-align: right;
      font-family: ui-monospace, "Share Tech Mono", monospace;
      font-size: 0.72rem; letter-spacing: 0.05em;
      color: rgba(140,140,140,0.85);
      background: rgba(0,0,0,0.03);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .last-edited-strip strong { color: rgba(60,60,60,0.85); font-weight: 500; }
    #last-edited { color: #d06010; font-weight: 600; }
    #last-edited.fresh { color: #0a8a4a; }
    #last-edited.stale { color: #c82040; }
  </style>
</head>
<body>

  <header>
    <h1>Altru — Operations Console</h1>
    <div class="sub">Disbursement queue, invoices and compliance. Access-controlled.</div>
  </header>

  <div class="counts" id="counts"></div>

  <div class="tabs">
    <button class="tab active" data-tab="disb">Disbursements</button>
    <button class="tab" data-tab="inv">Invoices</button>
    <button class="tab" data-tab="comp">Compliance</button>
  </div>

  <main>
    <div class="panel active" id="panel-disb">
      <div class="filters" id="disbFilters">
        <button data-status="queued" class="on">Queued</button>
        <button data-status="sent">Sent</button>
        <button data-status="confirmed">Confirmed</button>
        <button data-status="">All</button>
      </div>
      <div id="disbWrap"><p class="empty">Loading…</p></div>
    </div>

    <div class="panel" id="panel-inv">
      <div id="invWrap"><p class="empty">Loading…</p></div>
    </div>

    <div class="panel" id="panel-comp">
      <h2>Data subject requests (PDPA)</h2>
      <div id="dsrWrap"><p class="empty">Loading…</p></div>
      <h2>Sanctions screening</h2>
      <div id="sancWrap"><p class="empty">Loading…</p></div>
      <h2>AI tasks awaiting review</h2>
      <div id="aiWrap"><p class="empty">Loading…</p></div>
    </div>
  </main>

  <div class="last-edited-strip" role="status" aria-live="polite">
    <strong>Page last edited:</strong> <span id="last-edited" data-edited="2026-05-16T18:45:00+08:00">checking…</span>
  </div>

  <script>
  (function () {
    'use strict';
    function $(id) { return document.getElementById(id); }
    function setHtml(el, html) { el.replaceChildren(); if (html) el.insertAdjacentHTML('beforeend', html); }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function fmt(c) { return 'S$' + ((c || 0) / 100).toFixed(2); }
    function dt(ts) { return ts ? new Date(ts * 1000).toISOString().slice(0, 10) : '—'; }
    var disbStatus = 'queued';

    async function get(path) {
      try {
        var r = await fetch(path);
        if (!r.ok) return null;
        return await r.json();
      } catch (e) { return null; }
    }
    async function post(path, body) {
      var r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      return r.ok;
    }

    // ── Tabs ──
    Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (t) {
      t.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function (x) { x.classList.remove('active'); });
        t.classList.add('active');
        $('panel-' + t.dataset.tab).classList.add('active');
      });
    });

    // ── Disbursements ──
    $('disbFilters').addEventListener('click', function (e) {
      if (e.target.tagName !== 'BUTTON') return;
      disbStatus = e.target.dataset.status;
      document.querySelectorAll('#disbFilters button').forEach(function (b) { b.classList.remove('on'); });
      e.target.classList.add('on');
      loadDisbursements();
    });

    async function loadDisbursements() {
      var q = disbStatus ? ('?status=' + disbStatus) : '';
      var data = await get('/api/admin/disbursements' + q);
      var rows = (data && data.disbursements) || [];
      if (rows.length === 0) { setHtml($('disbWrap'), '<p class="empty">No disbursements.</p>'); return; }
      var body = rows.map(function (d) {
        var who = d.beneficiary_type === 'charity'
          ? esc(d.charity_name || d.charity_id || 'Charity')
          : 'Couple (personal)';
        var chip = { queued: 'warn', sent: 'warn', confirmed: 'ok', failed: 'bad' }[d.status] || 'mut';
        var action = '';
        if (d.status === 'queued') action = '<button class="act" data-sent="' + esc(d.id) + '">Mark sent</button>';
        else if (d.status === 'sent') action = '<button class="act ghost" data-conf="' + esc(d.id) + '">Mark confirmed</button>';
        return '<tr><td>' + esc(dt(d.queued_at)) + '</td><td>' + who + '</td>' +
          '<td>' + esc(d.beneficiary_uen || '—') + '</td>' +
          '<td class="amt">' + fmt(d.amount_cents) + '</td>' +
          '<td><span class="chip ' + chip + '">' + esc(d.status) + '</span></td>' +
          '<td>' + esc(d.bank_ref || '—') + '</td><td>' + action + '</td></tr>';
      }).join('');
      setHtml($('disbWrap'),
        '<table><thead><tr><th>Queued</th><th>Beneficiary</th><th>UEN / mobile</th>' +
        '<th style="text-align:right;">Amount</th><th>Status</th><th>Bank ref</th><th></th></tr></thead><tbody>' +
        body + '</tbody></table>');
    }

    document.addEventListener('click', async function (e) {
      var sent = e.target.getAttribute && e.target.getAttribute('data-sent');
      var conf = e.target.getAttribute && e.target.getAttribute('data-conf');
      var dsr = e.target.getAttribute && e.target.getAttribute('data-dsr');
      if (sent) {
        var ref = window.prompt('Bank / PayNow reference for this payout (optional):', '');
        if (ref === null) return;
        e.target.disabled = true;
        var okSent = await post('/api/admin/disbursements/' + encodeURIComponent(sent) + '/sent', { bank_ref: ref });
        if (okSent) { await loadDisbursements(); await loadCounts(); }
        else { e.target.disabled = false; alert('Could not mark sent.'); }
      } else if (conf) {
        if (!window.confirm('Confirm this payout has settled?')) return;
        e.target.disabled = true;
        var okConf = await post('/api/admin/disbursements/' + encodeURIComponent(conf) + '/confirmed', {});
        if (okConf) { await loadDisbursements(); }
        else { e.target.disabled = false; alert('Could not confirm.'); }
      } else if (dsr) {
        if (!window.confirm('Mark this data subject request as completed?')) return;
        e.target.disabled = true;
        var okDsr = await post('/api/admin/dsr/' + encodeURIComponent(dsr) + '/complete', {});
        if (okDsr) { await loadDsr(); await loadCounts(); }
        else { e.target.disabled = false; alert('Could not complete.'); }
      }
    });

    // ── Invoices ──
    async function loadInvoices() {
      var data = await get('/api/admin/invoices');
      var rows = (data && data.invoices) || [];
      if (rows.length === 0) { setHtml($('invWrap'), '<p class="empty">No invoices.</p>'); return; }
      var body = rows.map(function (i) {
        var chip = { issued: 'warn', paid: 'ok', overdue: 'bad' }[i.status] || 'mut';
        return '<tr><td>' + esc(i.period_month) + '</td><td>' + esc(i.charity_name || i.charity_id) + '</td>' +
          '<td>' + (i.gift_count || 0) + '</td>' +
          '<td class="amt">' + fmt(i.gross_charity_amount_cents) + '</td>' +
          '<td class="amt">' + fmt(i.altru_fee_cents) + '</td>' +
          '<td><span class="chip ' + chip + '">' + esc(i.status) + '</span></td></tr>';
      }).join('');
      setHtml($('invWrap'),
        '<table><thead><tr><th>Period</th><th>Charity</th><th>Gifts</th>' +
        '<th style="text-align:right;">Gross</th><th style="text-align:right;">5% fee</th><th>Status</th></tr></thead><tbody>' +
        body + '</tbody></table>');
    }

    // ── Compliance ──
    async function loadDsr() {
      var data = await get('/api/admin/dsr');
      var rows = (data && data.requests) || [];
      if (rows.length === 0) { setHtml($('dsrWrap'), '<p class="empty">No data subject requests.</p>'); return; }
      var now = Date.now() / 1000;
      var body = rows.map(function (r) {
        var done = r.status === 'completed';
        var overdue = !done && r.deadline_at && r.deadline_at < now;
        var chip = done ? 'ok' : (overdue ? 'bad' : 'warn');
        var action = done ? '' : '<button class="act ghost" data-dsr="' + esc(r.id) + '">Complete</button>';
        return '<tr><td>' + esc(r.request_type) + '</td><td>' + esc(r.contact_email) + '</td>' +
          '<td>' + esc(dt(r.deadline_at)) + '</td>' +
          '<td><span class="chip ' + chip + '">' + esc(overdue ? 'overdue' : r.status) + '</span></td>' +
          '<td>' + action + '</td></tr>';
      }).join('');
      setHtml($('dsrWrap'),
        '<table><thead><tr><th>Type</th><th>Requester</th><th>Deadline</th><th>Status</th><th></th></tr></thead><tbody>' +
        body + '</tbody></table>');
    }

    async function loadSanctions() {
      var data = await get('/api/admin/sanctions');
      var rows = (data && data.checks) || [];
      if (rows.length === 0) { setHtml($('sancWrap'), '<p class="empty">No sanctions screenings recorded.</p>'); return; }
      var body = rows.map(function (s) {
        var chip = { pass: 'ok', review: 'warn', fail: 'bad' }[s.result] || 'mut';
        return '<tr><td>' + esc(dt(s.checked_at)) + '</td><td>' + esc(s.entity_type) + '</td>' +
          '<td>' + esc(s.name_checked) + '</td>' +
          '<td><span class="chip ' + chip + '">' + esc(s.result) + '</span></td>' +
          '<td>' + esc(s.list_version) + '</td></tr>';
      }).join('');
      setHtml($('sancWrap'),
        '<table><thead><tr><th>Checked</th><th>Entity</th><th>Name</th><th>Result</th><th>List</th></tr></thead><tbody>' +
        body + '</tbody></table>');
    }

    async function loadAiTasks() {
      var data = await get('/api/admin/ai-tasks');
      var rows = (data && data.tasks) || [];
      if (rows.length === 0) { setHtml($('aiWrap'), '<p class="empty">No AI tasks awaiting review.</p>'); return; }
      var body = rows.map(function (t) {
        return '<tr><td>' + esc(dt(t.created_at)) + '</td><td>' + esc(t.task_type) + '</td>' +
          '<td>' + esc(t.model_used || '—') + '</td>' +
          '<td><span class="chip warn">' + esc(t.status) + '</span></td></tr>';
      }).join('');
      setHtml($('aiWrap'),
        '<table><thead><tr><th>Created</th><th>Task</th><th>Model</th><th>Status</th></tr></thead><tbody>' +
        body + '</tbody></table>');
    }

    async function loadCounts() {
      var results = await Promise.all([
        get('/api/admin/disbursements?status=queued'),
        get('/api/admin/dsr'),
        get('/api/admin/sanctions?result=review')
      ]);
      var queued = ((results[0] && results[0].disbursements) || []).length;
      var openDsr = ((results[1] && results[1].requests) || []).filter(function (r) {
        return r.status !== 'completed';
      }).length;
      var reviews = ((results[2] && results[2].checks) || []).length;
      setHtml($('counts'),
        '<div class="count ' + (queued ? 'warn' : '') + '"><b>' + queued + '</b>Queued payouts</div>' +
        '<div class="count ' + (openDsr ? 'warn' : '') + '"><b>' + openDsr + '</b>Open DSRs</div>' +
        '<div class="count ' + (reviews ? 'warn' : '') + '"><b>' + reviews + '</b>Sanctions reviews</div>');
    }

    loadCounts();
    loadDisbursements();
    loadInvoices();
    loadDsr();
    loadSanctions();
    loadAiTasks();
  })();
  </script>

<script>
(function () {
  const el = document.getElementById('last-edited');
  if (!el) return;
  const iso = el.dataset.edited;
  if (!iso) { el.textContent = '—'; return; }
  const d = new Date(iso);
  const fmt = d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
  const ago = Math.floor((Date.now() - d.getTime()) / 86400000);
  let suffix;
  if (ago === 0) suffix = 'today';
  else if (ago === 1) suffix = 'yesterday';
  else if (ago < 14) suffix = ago + ' days ago';
  else if (ago < 60) suffix = Math.floor(ago/7) + ' weeks ago';
  else suffix = Math.floor(ago/30) + ' months ago';
  el.textContent = fmt + ' · ' + suffix;
  if (ago <= 7) el.classList.add('fresh');
  else if (ago > 14) el.classList.add('stale');
})();
</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/auth-gate.js"></script>
</body>
</html>
